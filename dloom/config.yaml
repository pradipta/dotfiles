# dloom configuration file
version: 0.0.1

verbose: true

link_overrides:
  # Only files that need customization should be listed here
  # The rest will be installed as is
  zsh:
    file_overrides:
      ".zshrc.mac":
        target_name: ".zshrc-platform"
        conditions:
          os: ["darwin"]
      ".zshrc.linux":
        target_name: ".zshrc-platform"
        conditions:
          os: ["linux"]
  dloom:
    file_overrides:
      "config.yaml":
        target_dir: "~/.config/dloom"
  resources:
    conditions:
      os: ["darwin"]
    file_overrides:
      # Directory entries — redirect to the correct system dirs (MkdirAll is a no-op since they exist)
      "fonts":
        target_dir: "/System/Library"
        target_name: "Fonts"
      "wallpapers":
        target_dir: "/System/Library"
        target_name: "Desktop Pictures"
      # Font files — target_name uses "../" so filepath.Join("fonts", "../Foo.ttf") = "Foo.ttf"
      "Consolas.ttf":
        target_dir: "/System/Library/Fonts"
        target_name: "../Consolas.ttf"
      "Consolasligaturizedv3.ttf":
        target_dir: "/System/Library/Fonts"
        target_name: "../Consolasligaturizedv3.ttf"
      "Consolasligaturizedv3-Bold.ttf":
        target_dir: "/System/Library/Fonts"
        target_name: "../Consolasligaturizedv3-Bold.ttf"
      "Consolasligaturizedv3-Italic.ttf":
        target_dir: "/System/Library/Fonts"
        target_name: "../Consolasligaturizedv3-Italic.ttf"
      "Consolasligaturizedv3-BoldItalic.ttf":
        target_dir: "/System/Library/Fonts"
        target_name: "../Consolasligaturizedv3-BoldItalic.ttf"
      # Wallpaper files — same trick: filepath.Join("wallpapers", "../foo.png") = "foo.png"
      "3440x1440-mushroom.png":
        target_dir: "/System/Library/Desktop Pictures"
        target_name: "../3440x1440-mushroom.png"